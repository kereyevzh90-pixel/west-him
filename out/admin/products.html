<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточки каталога — West Him</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }

    /* LOGIN */
    #login-screen { position: fixed; inset: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .lc { background: #fff; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 40px rgba(0,0,0,.08); text-align: center; }
    .ll { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .ll img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .ll-t { text-align: left; }
    .ll-name { font-size: 18px; font-weight: 800; display: block; }
    .ll-sub { font-size: 11px; color: #999; display: block; }
    .l-title { font-size: 21px; font-weight: 700; margin-bottom: 6px; }
    .l-sub { font-size: 14px; color: #888; margin-bottom: 24px; }
    .l-inp { width: 100%; padding: 13px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px; transition: border .2s; }
    .l-inp:focus { border-color: #C8102E; }
    .l-btn { width: 100%; padding: 13px; background: #C8102E; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .l-btn:hover { background: #a50d25; }
    .l-err { color: #C8102E; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* HEADER */
    .admin-header { background: #fff; border-bottom: 1px solid #ebebeb; padding: 0 32px; height: 64px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
    .admin-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .admin-logo img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .admin-logo .name { font-weight: 800; font-size: 16px; }
    .admin-logo .tag { font-size: 11px; font-weight: 600; color: #C8102E; background: rgba(200,16,46,.1); padding: 2px 8px; border-radius: 20px; letter-spacing: .5px; text-transform: uppercase; }
    .h-spacer { flex: 1; }
    .h-btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .2s; border: none; }
    .h-btn-add { background: #C8102E; color: #fff; }
    .h-btn-add:hover { background: #a50d25; }
    .h-btn-ghost { background: #fff; border: 1.5px solid #e0e0e0; color: #555; text-decoration: none; display: inline-flex; align-items: center; }
    .h-btn-ghost:hover { border-color: #aaa; color: #111; }
    .logout-btn { padding: 8px 18px; border: 1.5px solid #e0e0e0; background: #fff; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .logout-btn:hover { border-color: #C8102E; color: #C8102E; }

    /* BODY */
    #admin-panel { display: none; }
    .admin-body { max-width: 1100px; margin: 0 auto; padding: 36px 24px 80px; }

    /* GLOBAL STATUS */
    #g-status { font-size: 13px; padding: 10px 16px; border-radius: 8px; margin-bottom: 20px; display: none; }
    #g-status.ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    #g-status.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    /* PRODUCT GRID */
    .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    .prod-item {
      background: #fff; border-radius: 16px; overflow: hidden;
      border: 1.5px solid #ebebeb; position: relative;
      transition: box-shadow .2s;
    }
    .prod-item:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }

    .prod-thumb {
      aspect-ratio: 3/4; background: #f5f5f5;
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .prod-thumb-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%); padding: 22px 10px 10px; }
    .prod-thumb-overlay-text { color: #fff; font-size: 11px; font-weight: 600; line-height: 1.35; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
    .prod-thumb-placeholder { color: #ccc; }
    .prod-thumb-placeholder svg { width: 40px; height: 40px; }

    .prod-cat-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 3px 10px; border-radius: 100px;
      font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    }
    .cat-bytovaya { background: rgba(200,16,46,.12); color: #C8102E; }
    .cat-avto { background: rgba(17,17,17,.1); color: #333; }

    .prod-info { padding: 12px 14px 14px; }
    .prod-name { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 12px; line-height: 1.3; }
    .prod-actions { display: flex; gap: 8px; }
    .btn-edit { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; background: #fff; border: 1.5px solid #ddd; color: #333; transition: all .2s; }
    .btn-edit:hover { border-color: #C8102E; color: #C8102E; }
    .btn-del { padding: 8px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; background: #fff; border: 1.5px solid #ddd; color: #999; transition: all .2s; }
    .btn-del:hover { border-color: #C8102E; background: #C8102E; color: #fff; }

    /* EMPTY STATE */
    .empty-state {
      padding: 80px 20px; text-align: center;
    }
    .empty-plus {
      width: 88px; height: 88px; border-radius: 50%;
      background: rgba(200,16,46,.07); border: 2px dashed rgba(200,16,46,.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; cursor: pointer; transition: all .2s;
      color: #C8102E;
    }
    .empty-plus:hover { background: rgba(200,16,46,.13); border-color: #C8102E; transform: scale(1.05); }
    .empty-plus svg { width: 36px; height: 36px; }
    .empty-title { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: #aaa; }

    /* ADD CARD (in grid, when cards already exist) */
    .prod-add {
      aspect-ratio: unset; min-height: 200px;
      border: 2px dashed #e0e0e0; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; transition: all .2s; color: #ccc; font-size: 14px; font-weight: 600;
      background: #fff;
    }
    .prod-add:hover { border-color: #C8102E; color: #C8102E; }
    .prod-add svg { width: 28px; height: 28px; }

    /* MODAL */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px; display: none;
    }
    .modal {
      background: #fff; border-radius: 20px; padding: 32px;
      width: 100%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; }

    /* Form */
    .form-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; }
    .form-group { margin-bottom: 18px; }
    .form-input {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none; transition: border .2s;
    }
    .form-input:focus { border-color: #C8102E; }
    .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; cursor: pointer; background: #fff; }
    .form-select:focus { border-color: #C8102E; }

    /* Image upload zone */
    .img-zone {
      border: 2px dashed #e0e0e0; border-radius: 12px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: all .2s; position: relative; background: #fafafa;
    }
    .img-zone:hover { border-color: #C8102E; background: rgba(200,16,46,.02); }
    .img-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .img-zone-preview {
      width: 100%; aspect-ratio: 3/4; border-radius: 10px;
      background-size: cover; background-position: center;
      margin-bottom: 10px; display: none; position: relative;
    }
    .img-zone-text { font-size: 14px; font-weight: 600; color: #aaa; }
    .img-zone-hint { font-size: 12px; color: #ccc; margin-top: 4px; }
    .img-zone.has-img .img-zone-text { color: #C8102E; }

    .progress-bar-wrap { height: 4px; background: #f0f0f0; border-radius: 4px; margin-top: 10px; display: none; }
    .progress-bar { height: 100%; background: #C8102E; border-radius: 4px; width: 0; transition: width .3s; }

    /* Modal buttons */
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-modal-save { flex: 1; padding: 13px; background: #C8102E; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s; }
    .btn-modal-save:hover { background: #a50d25; }
    .btn-modal-save:disabled { background: #ddd; color: #aaa; cursor: default; }
    .btn-modal-cancel { padding: 13px 20px; background: #fff; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-modal-cancel:hover { border-color: #aaa; }
    .modal-status { font-size: 13px; margin-top: 10px; min-height: 18px; }
    .modal-status.ok { color: #166534; }
    .modal-status.err { color: #C8102E; }
    .modal-status.loading { color: #888; }

    @media (max-width: 600px) {
      .admin-header { padding: 0 16px; }
      .admin-body { padding: 20px 16px 60px; }
      .prod-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lc">
    <div class="ll">
      <img src="../images/IMG_0921.PNG" alt="">
      <div class="ll-t"><span class="ll-name">WEST HIM</span><span class="ll-sub">Управление каталогом</span></div>
    </div>
    <div class="l-title" id="lt">Вход</div>
    <div class="l-sub" id="ld">Введи пароль</div>
    <input type="password" id="pwd" class="l-inp" placeholder="Пароль">
    <input type="password" id="tok" class="l-inp" placeholder="GitHub Token (только первый раз)" style="display:none">
    <button class="l-btn" onclick="doLogin()">Войти</button>
    <button class="l-btn" id="reset-btn" onclick="doReset()" style="display:none;background:#fff;color:#C8102E;border:1.5px solid #C8102E;margin-top:8px">Сбросить токен</button>
    <div class="l-err" id="lerr"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <header class="admin-header">
    <a class="admin-logo" href="../index.html" target="_blank">
      <img src="../images/IMG_0921.PNG" alt="">
      <span class="name">WEST HIM</span>
      <span class="tag">Каталог</span>
    </a>
    <div class="h-spacer"></div>
    <button class="h-btn h-btn-add" onclick="openModal()">+ Добавить карточку</button>
    <a class="h-btn h-btn-ghost" href="./index.html">← Назад</a>
    <button class="logout-btn" onclick="doLogout()">Выйти</button>
  </header>

  <div class="admin-body">
    <div id="g-status"></div>
    <div class="prod-grid" id="prod-grid">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Новая карточка</div>

    <div class="form-group">
      <label class="form-label">Название продукта</label>
      <input type="text" id="f-name" class="form-input" placeholder="Например: Средство для посуды">
    </div>

    <div class="form-group">
      <label class="form-label">Категория</label>
      <select id="f-cat" class="form-select">
        <option value="bytovaya">Бытовая химия</option>
        <option value="avto">Автохимия</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Текст поверх фото <span style="font-weight:400;color:#aaa">(необязательно)</span></label>
      <textarea id="f-desc" class="form-input" rows="2" placeholder="Например: 500 мл • Концентрат" style="resize:vertical;min-height:60px;line-height:1.4"></textarea>
      <div style="font-size:11px;color:#bbb;margin-top:4px">Появится на фото внизу карточки в каталоге</div>
    </div>

    <div class="form-group">
      <label class="form-label">Фото на карточке</label>
      <div class="img-zone" id="img-zone">
        <input type="file" accept="image/*" onchange="onImgPick(this)">
        <div class="img-zone-preview" id="img-preview"></div>
        <div class="img-zone-text" id="img-zone-text">Нажмите или перетащите фото</div>
        <div class="img-zone-hint">JPG, PNG — рекомендуется формат 3:4 (портрет)</div>
      </div>
      <div class="progress-bar-wrap" id="pb"><div class="progress-bar" id="pbr"></div></div>
    </div>

    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-modal-save" id="btn-modal-save" onclick="saveCard()">Сохранить</button>
    </div>
    <div class="modal-status" id="modal-status"></div>
  </div>
</div>

<script>
const OWNER = 'kereyevzh90-pixel', REPO = 'west-him', BRANCH = 'master';
const PRODUCTS_PATH = 'out/products.json';

let products = [];
let productsSha = '';
let editingId = null;   // null = new card, string = editing existing
let pendingImg = null;  // { file, base64 }

// ── AUTH ──

function initLogin() {
  const pwd = localStorage.getItem('adminPwd');
  const tok = localStorage.getItem('ghToken');
  if (pwd && tok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadProducts();
    return;
  }
  const has = !!pwd;
  document.getElementById('lt').textContent = has ? 'Вход' : 'Первый вход';
  document.getElementById('ld').textContent = has ? 'Введи пароль' : 'Придумай пароль и введи GitHub Token';
  document.getElementById('tok').style.display = has ? 'none' : 'block';
  document.getElementById('reset-btn').style.display = has ? 'block' : 'none';
}
function doLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  const tok = document.getElementById('tok').value.trim();
  const err = document.getElementById('lerr');
  const saved = localStorage.getItem('adminPwd');
  if (!saved) {
    if (!pwd || !tok) { err.textContent = 'Заполни оба поля'; return; }
    localStorage.setItem('adminPwd', pwd); localStorage.setItem('ghToken', tok);
  } else {
    if (pwd !== saved) { err.textContent = 'Неверный пароль'; document.getElementById('pwd').value = ''; return; }
  }
  err.textContent = '';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadProducts();
}
function doReset() {
  if (!confirm('Сбросить?')) return;
  localStorage.removeItem('adminPwd'); localStorage.removeItem('ghToken'); location.reload();
}
function doLogout() {
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd').value = '';
}
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('tok').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
initLogin();

// ── LOAD PRODUCTS ──

async function loadProducts() {
  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json' };
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PRODUCTS_PATH}?ref=${BRANCH}`, { headers });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    productsSha = data.sha;
    products = JSON.parse(atob(data.content.replace(/\n/g, '')));
    renderGrid();
  } catch(e) {
    showGlobal('Не удалось загрузить карточки: ' + e.message, 'err');
  }
}

// ── RENDER ──

const CAT = { bytovaya: 'Бытовая химия', avto: 'Автохимия' };

function renderGrid() {
  const grid = document.getElementById('prod-grid');

  if (products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-plus" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="empty-title">Нажмите + чтобы добавить карточку</div>
        <div class="empty-sub">Добавьте фото и название продукта — они появятся в каталоге</div>
      </div>`;
    return;
  }

  let html = '';
  products.forEach(p => {
    const hasPic = p.image && p.image !== '';
    const bgStyle = hasPic ? `background-image:url('../${p.image}');` : '';
    html += `
      <div class="prod-item" id="pi-${p.id}">
        <div class="prod-thumb" style="${bgStyle}">
          ${!hasPic ? `<div class="prod-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>` : ''}
          <span class="prod-cat-badge cat-${p.category}">${CAT[p.category] || ''}</span>
          ${p.description ? `<div class="prod-thumb-overlay"><div class="prod-thumb-overlay-text">${p.description}</div></div>` : ''}
        </div>
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-actions">
            <button class="btn-edit" onclick="openModal('${p.id}')">✏️ Изменить</button>
            <button class="btn-del" onclick="deleteCard('${p.id}')" title="Удалить">✕</button>
          </div>
        </div>
      </div>`;
  });

  html += `
    <div class="prod-add" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить
    </div>`;

  grid.innerHTML = html;
}

// ── MODAL ──

function openModal(id) {
  editingId = id || null;
  pendingImg = null;

  document.getElementById('modal-title').textContent = id ? 'Редактировать карточку' : 'Новая карточку';
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal-status').className = 'modal-status';
  document.getElementById('btn-modal-save').disabled = false;
  clearImgPreview();

  if (id) {
    const p = products.find(x => x.id === id);
    if (p) {
      document.getElementById('f-name').value = p.name;
      document.getElementById('f-cat').value = p.category;
      document.getElementById('f-desc').value = p.description || '';
      if (p.image) setImgPreview('../' + p.image);
    }
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-cat').value = 'bytovaya';
    document.getElementById('f-desc').value = '';
  }

  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  pendingImg = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── IMAGE PICK ──

function onImgPick(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImg = { file, base64: e.target.result.split(',')[1] };
    setImgPreview(e.target.result);
  };
  reader.readAsDataURL(file);
}

function setImgPreview(src) {
  const preview = document.getElementById('img-preview');
  const zone = document.getElementById('img-zone');
  const txt = document.getElementById('img-zone-text');
  preview.style.display = 'block';
  preview.style.backgroundImage = `url('${src}')`;
  txt.textContent = 'Нажмите, чтобы заменить';
  zone.classList.add('has-img');
}

function clearImgPreview() {
  const preview = document.getElementById('img-preview');
  const zone = document.getElementById('img-zone');
  const txt = document.getElementById('img-zone-text');
  preview.style.display = 'none';
  preview.style.backgroundImage = '';
  txt.textContent = 'Нажмите или перетащите фото';
  zone.classList.remove('has-img');
}

// ── SAVE CARD ──

async function saveCard() {
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  if (!name) { setModalStatus('Введи название продукта', 'err'); return; }

  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
  const apiBase = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;

  document.getElementById('btn-modal-save').disabled = true;
  setModalStatus('Сохраняем...', 'loading');

  let imagePath = '';

  // Upload image if selected
  if (pendingImg) {
    const id = editingId || ('prod_' + Date.now());
    const ext = pendingImg.file.name.split('.').pop().toLowerCase();
    imagePath = `images/prod_${id}.${ext}`;
    const githubImgPath = 'out/' + imagePath;

    setModalStatus('Загружаем фото...', 'loading');
    showPb(true); animatePb(30);

    try {
      let sha = null;
      const getRes = await fetch(`${apiBase}/${githubImgPath}?ref=${BRANCH}`, { headers });
      if (getRes.ok) sha = (await getRes.json()).sha;
      animatePb(60);

      const putRes = await fetch(`${apiBase}/${githubImgPath}`, {
        method: 'PUT', headers,
        body: JSON.stringify({ message: 'Каталог: фото ' + id, content: pendingImg.base64, branch: BRANCH, ...(sha ? { sha } : {}) }),
      });
      if (!putRes.ok) { const e = await putRes.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + putRes.status); }
      animatePb(100);
      await delay(200);
      showPb(false);
    } catch(e) {
      showPb(false);
      setModalStatus('Ошибка загрузки фото: ' + e.message, 'err');
      document.getElementById('btn-modal-save').disabled = false;
      return;
    }
  }

  // Update products array
  if (editingId) {
    const idx = products.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      products[idx].name = name;
      products[idx].category = cat;
      products[idx].description = desc;
      if (imagePath) products[idx].image = imagePath;
    }
  } else {
    const newId = 'prod_' + Date.now();
    products.push({ id: newId, name, category: cat, description: desc, image: imagePath });
  }

  // Save products.json
  setModalStatus('Обновляем каталог...', 'loading');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
    const putRes = await fetch(`${apiBase}/${PRODUCTS_PATH}`, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: 'Каталог: обновлены карточки', content, sha: productsSha, branch: BRANCH }),
    });
    if (!putRes.ok) { const e = await putRes.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + putRes.status); }
    const result = await putRes.json();
    productsSha = result.content.sha;
    setModalStatus('✓ Сохранено! Каталог обновится через ~1 мин.', 'ok');
    renderGrid();
    pendingImg = null;
    document.getElementById('btn-modal-save').disabled = false;
    setTimeout(closeModal, 1500);
  } catch(e) {
    setModalStatus('Ошибка: ' + e.message, 'err');
    document.getElementById('btn-modal-save').disabled = false;
  }
}

// ── DELETE ──

async function deleteCard(id) {
  const p = products.find(x => x.id === id);
  if (!confirm(`Удалить карточку "${p?.name}"?`)) return;

  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
  const apiBase = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;

  products = products.filter(x => x.id !== id);

  // Optionally delete image
  if (p?.image) {
    try {
      const getRes = await fetch(`${apiBase}/out/${p.image}?ref=${BRANCH}`, { headers });
      if (getRes.ok) {
        const { sha } = await getRes.json();
        await fetch(`${apiBase}/out/${p.image}`, { method: 'DELETE', headers, body: JSON.stringify({ message: 'Каталог: удалено фото ' + id, sha, branch: BRANCH }) });
      }
    } catch {}
  }

  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
    const putRes = await fetch(`${apiBase}/${PRODUCTS_PATH}`, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: 'Каталог: удалена карточка ' + id, content, sha: productsSha, branch: BRANCH }),
    });
    if (!putRes.ok) throw new Error('HTTP ' + putRes.status);
    const result = await putRes.json();
    productsSha = result.content.sha;
    renderGrid();
    showGlobal('✓ Карточка удалена. Каталог обновится через ~1 мин.', 'ok');
  } catch(e) {
    showGlobal('Ошибка при удалении: ' + e.message, 'err');
  }
}

// ── HELPERS ──

function setModalStatus(text, type) {
  const el = document.getElementById('modal-status');
  el.textContent = text;
  el.className = 'modal-status' + (type ? ' ' + type : '');
}

function showGlobal(text, type) {
  const el = document.getElementById('g-status');
  el.textContent = text;
  el.className = type;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function showPb(show) {
  document.getElementById('pb').style.display = show ? 'block' : 'none';
  if (!show) document.getElementById('pbr').style.width = '0';
}

function animatePb(pct) { document.getElementById('pbr').style.width = pct + '%'; }

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Редактор — West Him</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; min-height: 100vh; }

    /* ─── TOOLBAR ─── */
    #ed-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #111; height: 56px;
      display: flex; align-items: center; gap: 8px; padding: 0 18px;
      box-shadow: 0 2px 20px rgba(0,0,0,.5); font-family: 'Inter', sans-serif;
    }
    .ed-logo { font-size: 13px; font-weight: 800; color: #fff; letter-spacing: .5px; white-space: nowrap; margin-right: 4px; }
    .ed-sep { width: 1px; height: 22px; background: #2a2a2a; flex-shrink: 0; margin: 0 2px; }
    .ed-select {
      padding: 7px 10px; background: #1c1c1c; border: 1px solid #333;
      border-radius: 7px; color: #ddd; font-size: 13px; font-family: inherit;
      cursor: pointer; outline: none;
    }
    .ed-select:focus { border-color: #1A52B3; }
    .ed-btn {
      padding: 8px 13px; border-radius: 8px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; transition: all .2s;
      white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;
    }
    #btn-edit { background: #1e1e1e; color: #888; border: 1px solid #2e2e2e; }
    #btn-edit:hover { color: #fff; border-color: #444; }
    #btn-edit.on { background: #1A52B3; color: #fff; border-color: #1A52B3; }
    #btn-save { background: #14532d; color: #86efac; }
    #btn-save:hover:not(:disabled) { background: #166534; color: #fff; }
    #btn-save:disabled { background: #1a1a1a; color: #3a3a3a; cursor: default; border: 1px solid #252525; }
    .ed-spacer { flex: 1; }
    #ed-status { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
    #ed-status.ok { color: #4ade80; }
    #ed-status.err { color: #f87171; }
    #ed-status.loading { color: #888; }
    .ed-link {
      padding: 7px 11px; border-radius: 7px; font-size: 12px; color: #666;
      text-decoration: none; transition: all .2s; white-space: nowrap; font-weight: 500;
    }
    .ed-link:hover { background: #1e1e1e; color: #ddd; }

    /* ─── ROW2 (action buttons) ─── */
    .ed-row2 { display: contents; }

    /* ─── MOBILE TOOLBAR ─── */
    @media (max-width: 767px) {
      #ed-bar { height: auto; flex-wrap: wrap; padding: 7px 12px; gap: 6px; row-gap: 0; }
      .ed-logo { font-size: 12px; }
      .ed-select { font-size: 12px; padding: 6px 8px; }
      .ed-spacer { flex: 1; }
      #site-link { font-size: 12px; padding: 6px 8px; }
      .ed-row2 {
        display: flex; align-items: center; gap: 6px;
        width: 100%; padding: 5px 0 2px; border-top: 1px solid #222;
        margin-top: 2px;
      }
      .ed-row2 .ed-btn { font-size: 12px; padding: 7px 10px; }
      .ed-row2 .btn-lbl { display: none; }
      #ed-status { font-size: 11px; flex: 1; max-width: none; }
      #page-frame { margin-top: 100px; }
    }

    /* ─── PAGE FRAME ─── */
    #page-frame { margin-top: 56px; }

    /* ─── LOADING ─── */
    #ed-loading {
      position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
      background: #f9f9f9; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; z-index: 9998;
    }
    .spin { width: 36px; height: 36px; border: 3px solid #e8e8e8; border-top-color: #1A52B3; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-text { font-size: 13px; color: #aaa; }

    /* ─── EDIT MODE ─── */
    [data-ed]:not(:empty) {
      outline: 2px dashed transparent;
      border-radius: 3px;
      transition: outline .15s;
    }
    .ed-mode [data-ed]:not(:empty) {
      outline-color: rgba(26,82,179,.35);
      cursor: text;
    }
    .ed-mode [data-ed]:not(:empty):hover { outline-color: rgba(26,82,179,.65); }
    .ed-mode [data-ed]:not(:empty):focus { outline-color: #1A52B3 !important; background: rgba(26,82,179,.03) !important; }

    /* Image overlay */
    .ed-mode .ed-has-img { position: relative; }
    .ed-mode .ed-has-img::after {
      content: '📷 Заменить фото';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0); color: transparent;
      font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
      transition: background .2s, color .2s;
      cursor: pointer; border-radius: inherit;
    }
    .ed-mode .ed-has-img:hover::after {
      background: rgba(0,0,0,.42);
      color: #fff;
    }

    /* Empty cat-photo placeholder */
    .ed-cat-plus-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: 2px dashed rgba(26,82,179,.35);
      border-radius: 4px;
      font-size: 40px; font-weight: 300; color: rgba(26,82,179,.45);
      transition: color .2s, border-color .2s;
    }
    .ed-cat-plus-label:hover { border-color: #1A52B3; color: #1A52B3; }

    /* ─── FLOAT BADGE ─── */
    #ed-badge {
      position: fixed; bottom: 20px; right: 20px; z-index: 9997;
      background: #1A52B3; color: #fff; padding: 9px 18px;
      border-radius: 100px; font-size: 12px; font-weight: 700;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 20px rgba(26,82,179,.4); display: none;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .7; } }

    /* ─── CARD CONTROLS ─── */
    .ed-card-del {
      display: none; position: absolute; top: 10px; right: 10px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.95); border: 1.5px solid #ddd;
      color: #aaa; font-size: 20px; line-height: 1;
      align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; transition: all .15s; padding: 0; font-family: inherit;
    }
    .ed-mode .ed-card-del { display: flex; }
    .ed-card-del:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
    .ed-card-add-btn {
      display: none; width: 100%; margin-top: 12px; padding: 16px;
      border: 2px dashed rgba(26,82,179,0.3); border-radius: 12px;
      background: rgba(26,82,179,0.04); color: #1A52B3;
      font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .2s;
    }
    .ed-mode .ed-card-add-btn { display: block; }
    .ed-card-add-btn:hover { background: rgba(26,82,179,0.1); border-color: #1A52B3; }

    /* ─── LOGIN ─── */
    #login-screen {
      position: fixed; inset: 0; background: #f5f5f5;
      display: flex; align-items: center; justify-content: center; z-index: 99999;
    }
    .lc {
      background: #fff; border-radius: 20px; padding: 48px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 40px rgba(0,0,0,.08); text-align: center;
    }
    .ll { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .ll img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .ll-name { font-size: 18px; font-weight: 800; display: block; text-align: left; }
    .ll-sub { font-size: 11px; color: #999; display: block; text-align: left; }
    .lt { font-size: 21px; font-weight: 700; margin-bottom: 6px; }
    .ld { font-size: 14px; color: #888; margin-bottom: 24px; }
    .li {
      width: 100%; padding: 13px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px; transition: border .2s;
    }
    .li:focus { border-color: #1A52B3; }
    .lb {
      width: 100%; padding: 13px; background: #1A52B3; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background .2s;
    }
    .lb:hover { background: #1340a0; }
    .le { color: #1A52B3; font-size: 13px; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lc">
    <div class="ll">
      <img src="../images/IMG_1007.PNG" alt="West Him">
      <div>
        <span class="ll-name">WEST HIM</span>

<!-- TOOLBAR -->
<div id="ed-bar">

  <div class="ed-sep"></div>
  <select class="ed-select" id="pg" onchange="loadPage(this.value)">
    <option value="index.html">Главная</option>

  <div class="ed-row2">

</div>

<!-- Loading -->
<div id="ed-loading" style="display:none">

</div>

<!-- Page content rendered here -->
<div id="page-frame"></div>

<!-- Edit mode badge -->
<div id="ed-badge">✏️ Режим редактирования — кликай на любой текст</div>

<!-- Price Modal -->
<div id="price-modal" style="display:none;position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,.6);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:32px;width:100%;max-width:440px;font-family:'Inter',sans-serif;margin:16px;">
    <div style="font-size:18px;font-weight:800;margin-bottom:4px;" id="pm-title">Прайс-лист</div>
    <div style="font-size:13px;color:#888;margin-bottom:18px;" id="pm-sub"></div>
    <div id="pm-cur" style="display:none;align-items:center;gap:8px;padding:9px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;margin-bottom:14px;font-size:13px;font-weight:600;color:#166534;">✓ Файл уже загружен на сайт</div>
    <div id="pm-dz" style="border:2px dashed #ddd;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;position:relative;background:#fafafa;margin-bottom:14px;transition:all .2s;">

      <button onclick="doPriceUpload()" id="pm-upload-btn" disabled style="flex:1;padding:11px;background:#1A52B3;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;">⬆ Загрузить</button>
      <button onclick="doPriceDelete()" style="padding:11px 16px;background:#fff;color:#999;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;">Удалить</button>
      <button onclick="closePriceModal()" style="padding:11px 16px;background:#fff;color:#666;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;">✕</button>

<!-- Hidden file inputs -->
<input type="file" id="img-picker" accept="image/*" style="display:none">

<script>
const OWNER = 'kereyevzh90-pixel', REPO = 'west-him', BRANCH = 'master';

const PAGE_PRICES = {
  'katalog.html':        { label: 'Каталог',        file: 'price.pdf',              path: 'out/price.pdf',              url: '../price.pdf' },
  'bytovaya-himiya.html':{ label: 'Бытовая химия',  file: 'price.pdf',              path: 'out/price.pdf',              url: '../price.pdf' },
  'avtohimiya.html':     { label: 'Автохимия',       file: 'price.pdf',              path: 'out/price.pdf',              url: '../price.pdf' },
  'opt.html':            { label: 'Опт и розница',   file: 'price-opt.pdf',          path: 'out/price-opt.pdf',          url: '../price-opt.pdf' },
  'proizvodstvo.html':   { label: 'Производство',    file: 'price-proizvodstvo.pdf', path: 'out/price-proizvodstvo.pdf', url: '../price-proizvodstvo.pdf' },
};

let curPage = 'index.html';
let srcHtml = '', srcSha = '';
let editMode = false, dirty = false, structuralChange = false;

// Tags to never make editable
const SKIP_TAGS = new Set(['script','style','noscript','meta','link','title','svg','path','img','input','select','textarea','br','hr','head','html','button']);

function isEditable(el) {
  if (SKIP_TAGS.has(el.tagName.toLowerCase())) return false;
  return Array.from(el.childNodes).some(n => n.nodeType === 3 && n.textContent.trim());
}

// ─── AUTH ───

function initLogin() {
  const pwd = localStorage.getItem('adminPwd');
  const tok = localStorage.getItem('ghToken');
  if (pwd && tok) {
    document.getElementById('login-screen').style.display = 'none';
    loadPage('index.html');
    return;
  }
  const has = !!pwd;
  document.getElementById('lt').textContent = has ? 'Вход в редактор' : 'Первый вход';
  document.getElementById('ld').textContent = has ? 'Введи пароль' : 'Придумай пароль и введи GitHub Token';
  document.getElementById('tok').style.display = has ? 'none' : 'block';
  document.getElementById('reset-btn').style.display = has ? 'block' : 'none';
}

function doLogin() {
  const pwd = document.getElementById('pwd').value.trim();
  const tok = document.getElementById('tok').value.trim();
  const err = document.getElementById('lerr');
  const saved = localStorage.getItem('adminPwd');
  if (!saved) {
    if (!pwd || !tok) { err.textContent = 'Заполни оба поля'; return; }
    localStorage.setItem('adminPwd', pwd);
    localStorage.setItem('ghToken', tok);
  } else {
    if (pwd !== saved) { err.textContent = 'Неверный пароль'; document.getElementById('pwd').value = ''; return; }
  }
  err.textContent = '';
  document.getElementById('login-screen').style.display = 'none';
  loadPage('index.html');
}

function doReset() {
  if (!confirm('Сбросить пароль и токен?')) return;
  localStorage.removeItem('adminPwd'); localStorage.removeItem('ghToken'); location.reload();
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('tok').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
initLogin();

// ─── LOAD PAGE ───

async function loadPage(file) {
  if (dirty && !confirm('Есть несохранённые изменения. Продолжить без сохранения?')) {
    document.getElementById('pg').value = curPage; return;
  }
  curPage = file;
  document.getElementById('pg').value = file;
  document.getElementById('site-link').href = '../' + file;
  const btnP = document.getElementById('btn-products');
  btnP.style.display = file === 'katalog.html' ? 'inline-flex' : 'none';
  updatePriceBtn(file);
  if (editMode) exitEditMode();
  dirty = false; structuralChange = false;
  document.getElementById('btn-save').disabled = true;
  document.getElementById('page-frame').innerHTML = '';
  showLoad(true, 'Загружаем ' + file + '…');

  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json' };
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/out/${file}?ref=${BRANCH}`, { headers });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    srcSha = data.sha;
    srcHtml = b64decode(data.content);
    renderPage(srcHtml);
    if (file === 'katalog.html') loadCatalogProducts();
    showLoad(false);
    setStatus('');
  } catch(e) {
    showLoad(false);
    setStatus('Ошибка: ' + e.message, 'err');
  }
}

function b64decode(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\n/g, ''))));
}

function b64encode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function renderPage(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Inject page CSS into our head (remove old)
  document.querySelectorAll('style.pg').forEach(s => s.remove());
  doc.querySelectorAll('style').forEach(st => {
    const s = document.createElement('style');
    s.className = 'pg';
    s.textContent = st.textContent
      .replace(/url\(['"]?images\//g, "url('../images/")
      .replace(/url\("images\//g, "url('../images/");
    document.head.appendChild(s);
  });

  const body = doc.body;

  // Fix image src paths
  body.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src') || '';
    if (!src.startsWith('http') && !src.startsWith('//') && !src.startsWith('../') && !src.startsWith('data:')) {
      img.setAttribute('src', '../' + src);
    }
  });

  // Fix inline background-image paths
  body.querySelectorAll('[style]').forEach(el => {
    const s = el.getAttribute('style');
    if (s && /url\(['"]?images\//.test(s)) {
      el.setAttribute('style', s
        .replace(/url\('images\//g, "url('../images/")
        .replace(/url\("images\//g, 'url("../images/')
        .replace(/url\(images\//g, 'url(../images/')
      );
    }
  });

  // Internal links: open in new tab (relative to admin folder)
  body.querySelectorAll('a').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (!href.startsWith('http') && !href.startsWith('#') && !href.startsWith('//') && href !== '') {
      a.setAttribute('data-orig-href', href);
      const fixed = href.startsWith('../') ? href : '../' + href;
      a.setAttribute('href', fixed);
      a.setAttribute('target', '_blank');
    }
  });

  // Remove inline scripts
  body.querySelectorAll('script').forEach(s => s.remove());

  document.getElementById('page-frame').innerHTML = body.innerHTML;

  // Re-init FAQ toggle
  document.querySelectorAll('.faq-q').forEach(q => {
    q.style.cursor = 'pointer';
    q.addEventListener('click', function() {
      if (!editMode) this.parentElement.classList.toggle('open');
    });
  });

  // Fix sticky header offset
  document.querySelectorAll('.header').forEach(h => { h.style.top = '56px'; });
}

// ─── EDIT MODE ───

function toggleEdit() {
  editMode ? exitEditMode() : enterEditMode();
}

function enterEditMode() {
  editMode = true;
  const frame = document.getElementById('page-frame');
  frame.classList.add('ed-mode');
  document.getElementById('btn-edit').classList.add('on');
  document.getElementById('btn-edit').innerHTML = '✕ <span class="btn-lbl">Выйти</span>';
  document.getElementById('ed-badge').style.display = 'block';

  // Disable link navigation while editing
  frame.querySelectorAll('a[href]').forEach(a => {
    a.setAttribute('data-ed-href', a.getAttribute('href'));
    a.removeAttribute('href');
    a.removeAttribute('target');
  });

  // Make ALL text-containing elements editable
  let idx = 0;
  frame.querySelectorAll('*').forEach(el => {
    if (!isEditable(el)) return;
    el.setAttribute('data-ed', '1');
    el.setAttribute('data-ed-idx', idx++);
    el.contentEditable = 'true';
    el.addEventListener('input', markDirty);
  });

  // Images — add click-to-replace
  frame.querySelectorAll('img').forEach(img => {
    const path = imgToGithubPath(img.getAttribute('src'));
    if (!path) return;
    img.classList.add('ed-has-img');
    img.style.cursor = 'pointer';
    img.addEventListener('click', () => pickAndUploadImg(path, img, null), { once: false });
    img._edPath = path;
  });

  // Background images (cat-photo etc.)
  frame.querySelectorAll('[style*="background-image"]').forEach(el => {
    const s = el.getAttribute('style') || '';
    const m = s.match(/url\(['"]?\.\.\/(images\/[\w.\-]+)[^'")\s]*['"]?\)/);
    if (!m) return;
    const path = 'out/' + m[1];
    el.classList.add('ed-has-img');
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => {
      if (e.target.closest('[contenteditable="true"]')) return;
      if (e.target !== el && !el.contains(e.target)) return;
      pickAndUploadImg(path, null, el);
    });
    el._edPath = path;
  });

  // Empty cat-photo placeholders — inject a <label>+<input> "+" button
  let catIdx = 0;
  frame.querySelectorAll('.cat-photo').forEach(el => {
    const s = el.getAttribute('style') || '';
    if (s.includes('background-image')) { catIdx++; return; }
    const idx = catIdx++;
    el.classList.add('ed-cat-empty');
    el.style.position = 'relative';
    const uid = 'cat-file-' + idx;
    const label = document.createElement('label');
    label.className = 'ed-cat-plus-label';
    label.htmlFor = uid;
    label.textContent = '+';
    const input = document.createElement('input');
    input.type = 'file';
    input.id = uid;
    input.accept = 'image/*';
    input.style.display = 'none';
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      input.value = '';
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const githubPath = `out/images/cat_${idx}_${Date.now()}.${ext}`;
      await uploadNewCatPhoto(githubPath, file, el);
    });
    el.appendChild(label);
    el.appendChild(input);
  });

  // Card management
  addCardControls(frame);
}

function imgToGithubPath(src) {
  if (!src) return null;
  if (src.includes('../images/')) return 'out/images/' + src.split('../images/')[1].split('?')[0];
  if (src.includes('../logo.png')) return 'out/logo.png';
  return null;
}

function pickAndUploadImg(githubPath, imgEl, bgEl) {
  const picker = document.getElementById('img-picker');
  const handler = async () => {
    picker.removeEventListener('change', handler);
    const file = picker.files[0];
    if (!file) return;
    picker.value = '';
    await uploadImgFile(githubPath, file, imgEl, bgEl);
  };
  picker.addEventListener('change', handler);
  picker.click();
}

async function uploadImgFile(githubPath, file, imgEl, bgEl) {
  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
  const apiBase = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
  setStatus('Загружаем фото…', 'loading');
  try {
    const content = await toBase64(file);
    let sha = null;
    const getRes = await fetch(`${apiBase}/${githubPath}?ref=${BRANCH}`, { headers });
    if (getRes.ok) sha = (await getRes.json()).sha;
    const putRes = await fetch(`${apiBase}/${githubPath}`, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: 'Редактор: заменено ' + githubPath.split('/').pop(), content, branch: BRANCH, ...(sha ? { sha } : {}) }),
    });
    if (!putRes.ok) { const e = await putRes.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + putRes.status); }
    // Update DOM immediately (cache bust)
    const newSrc = '../' + githubPath.replace(/^out\//, '') + '?t=' + Date.now();
    if (imgEl) imgEl.src = newSrc;
    if (bgEl) {
      const s = bgEl.getAttribute('style');
      bgEl.setAttribute('style', s.replace(/url\(['"][^'"]+['"]\)/, `url('${newSrc}')`));
    }
    setStatus('✓ Фото загружено! Появится на сайте через ~1 мин.', 'ok');
  } catch(e) {
    setStatus('Ошибка: ' + e.message, 'err');
  }
}

async function uploadNewCatPhoto(githubPath, file, bgEl) {
  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
  const apiBase = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
  setStatus('Загружаем фото…', 'loading');
  try {
    const content = await toBase64(file);
    const checkRes = await fetch(`${apiBase}/${githubPath}`, { headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github+json' } });
    const bodyObj = { message: 'Редактор: добавлено фото ' + githubPath.split('/').pop(), content, branch: BRANCH };
    if (checkRes.ok) { bodyObj.sha = (await checkRes.json()).sha; }
    const putRes = await fetch(`${apiBase}/${githubPath}`, {
      method: 'PUT', headers,
      body: JSON.stringify(bodyObj),
    });
    if (!putRes.ok) { const e = await putRes.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + putRes.status); }
    const newSrc = '../' + githubPath.replace(/^out\//, '') + '?t=' + Date.now();
    // Set background-image
    const cur = bgEl.getAttribute('style') || '';
    bgEl.setAttribute('style', (cur ? cur + '; ' : '') + `background-image: url('${newSrc}')`);
    // Switch from "empty" to normal replace handler
    bgEl.classList.remove('ed-cat-empty');
    bgEl.classList.add('ed-has-img');
    bgEl.style.cursor = 'pointer';
    if (bgEl._catEmptyHandler) { bgEl.removeEventListener('click', bgEl._catEmptyHandler); delete bgEl._catEmptyHandler; }
    bgEl._edPath = githubPath;
    bgEl.addEventListener('click', (e) => {
      if (e.target.closest('[contenteditable="true"]')) return;
      if (e.target !== bgEl && !bgEl.contains(e.target)) return;
      pickAndUploadImg(githubPath, null, bgEl);
    });
    structuralChange = true;
    markDirty();
    setStatus('✓ Фото загружено! Нажмите «Сохранить».', 'ok');
  } catch(e) {
    setStatus('Ошибка: ' + e.message, 'err');
  }
}

function addNewCard(grid, cfg) {
  const card = document.createElement('div');

// ─── SAVE HTML ───

async function saveHtml() {
  if (!dirty) return;
  const token = localStorage.getItem('ghToken');
  if (!token) return;
  setStatus('Сохраняем…', 'loading');
  document.getElementById('btn-save').disabled = true;

  try {
    const frame = document.getElementById('page-frame');
    const newHtml = structuralChange ? buildHtmlFromDom(frame) : buildHtmlFromIdx(frame);
    const content = b64encode(newHtml);
    const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' };
    const putRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/out/${curPage}`, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: 'Редактор: изменена страница ' + curPage, content, sha: srcSha, branch: BRANCH }),
    });

    if (putRes.status === 401) { setStatus('Токен недействителен — войди снова', 'err'); return; }
    if (!putRes.ok) { const e = await putRes.json().catch(() => ({})); throw new Error(e.message || 'HTTP ' + putRes.status); }

    const result = await putRes.json();
    srcSha = result.content.sha;
    srcHtml = newHtml;
    dirty = false; structuralChange = false;
    setStatus('✓ Сохранено! Сайт обновится через ~1 мин.', 'ok');
  } catch(e) {
    setStatus('Ошибка: ' + e.message, 'err');
    document.getElementById('btn-save').disabled = false;
  }
}

function buildHtmlFromIdx(frame) {
  const parser = new DOMParser();
  const saveDoc = parser.parseFromString(srcHtml, 'text/html');
  const edited = {};
  frame.querySelectorAll('[data-ed-idx]').forEach(el => { edited[el.getAttribute('data-ed-idx')] = el.innerHTML; });
  let idx = 0;
  saveDoc.body.querySelectorAll('*').forEach(el => {
    if (!isEditable(el)) return;
    if (edited[idx] !== undefined) el.innerHTML = edited[idx];
    idx++;
  });
  return '<!DOCTYPE html>\n' + saveDoc.documentElement.outerHTML;
}

function buildHtmlFromDom(frame) {
  const parser = new DOMParser();
  const saveDoc = parser.parseFromString(srcHtml, 'text/html');
  // Collect scripts from srcHtml (removed during render)
  const scripts = Array.from(saveDoc.body.querySelectorAll('script')).map(s => s.outerHTML);
  // Clone and clean the live DOM
  const clone = frame.cloneNode(true);
  clone.querySelectorAll('.ed-card-del, .ed-card-add-btn').forEach(el => el.remove());
  clone.querySelectorAll('[contenteditable]').forEach(el => { el.removeAttribute('contenteditable'); el.removeAttribute('data-ed'); el.removeAttribute('data-ed-idx'); });
  clone.querySelectorAll('.ed-has-img').forEach(el => el.classList.remove('ed-has-img'));
  clone.querySelectorAll('.ed-cat-empty').forEach(el => el.classList.remove('ed-cat-empty'));
  clone.querySelectorAll('.ed-cat-plus-label, input[id^="cat-file-"]').forEach(el => el.remove());
  clone.querySelectorAll('img').forEach(img => { const s = img.getAttribute('src') || ''; if (s.startsWith('../')) img.setAttribute('src', s.slice(3)); });
  clone.querySelectorAll('[style]').forEach(el => { const s = el.getAttribute('style') || ''; el.setAttribute('style', s.replace(/url\('\.\.\/images\//g, "url('images/").replace(/url\("\.\.\/images\//g, 'url("images/')); if (!el.getAttribute('style')) el.removeAttribute('style'); });
  clone.querySelectorAll('[data-orig-href]').forEach(a => { a.setAttribute('href', a.getAttribute('data-orig-href')); a.removeAttribute('data-orig-href'); a.removeAttribute('target'); });
  clone.querySelectorAll('[data-ed-href]').forEach(a => { a.setAttribute('href', a.getAttribute('data-ed-href')); a.removeAttribute('data-ed-href'); });
  clone.querySelectorAll('.header').forEach(h => { h.style.top = ''; if (!h.getAttribute('style')) h.removeAttribute('style'); });
  CARD_CONFIGS.forEach(cfg => { clone.querySelectorAll(cfg.cardSel).forEach(c => { if (c.style.position === 'relative') { c.style.position = ''; if (!c.getAttribute('style')) c.removeAttribute('style'); } }); });
  // Replace body content, re-append scripts
  saveDoc.body.innerHTML = clone.innerHTML;
  scripts.forEach(s => { saveDoc.body.insertAdjacentHTML('beforeend', s); });
  return '<!DOCTYPE html>\n' + saveDoc.documentElement.outerHTML;
}

const PLACEHOLDER_SVG_ED = `<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9l4-4 4 4 4-4 4 4"/><circle cx="8.5" cy="14.5" r="1.5"/></svg>`;
const CAT_LABELS_ED = { bytovaya: 'Бытовая химия', avto: 'Автохимия' };

async function loadCatalogProducts() {
  const token = localStorage.getItem('ghToken');
  const headers = { Authorization: 'token ' + token, Accept: 'application/vnd.github+json' };
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/out/products.json?ref=${BRANCH}`, { headers });
    if (!res.ok) return;
    const data = await res.json();
    const products = JSON.parse(b64decode(data.content));
    const grid = document.querySelector('#page-frame #prod-grid');
    const empty = document.querySelector('#page-frame #prod-empty');
    if (!grid) return;
    if (products.length === 0) {
      if (empty) empty.style.display = 'block';
      return;
    }
    if (empty) empty.style.display = 'none';
    grid.innerHTML = products.map(p => {
      const hasImg = p.image && p.image !== '';
      const imgSrc = hasImg ? ('../' + p.image) : '';
      const cat = CAT_LABELS_ED[p.category] || '';
      const desc = p.description && p.description.trim() ? p.description.trim() : '';
      return `<div class="prod-card" data-cat="${p.category}" data-id="${p.id}">
        <div class="prod-card-img">
          ${hasImg ? `<img src="${imgSrc}" alt="${p.name}" loading="lazy"/>` : `<div class="prod-card-placeholder">${PLACEHOLDER_SVG_ED}</div>`}
        </div>
        <div class="prod-card-info">
          ${cat ? `<div class="prod-card-cat">${cat}</div>` : ''}
          <div class="prod-card-name">${p.name}</div>
          ${desc ? `<div class="prod-card-desc">${desc}</div>` : ''}
          ${p.price ? `<div class="prod-card-price">${p.price}</div>` : ''}
          <button class="prod-card-add">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            В корзину
          </button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    console.warn('loadCatalogProducts:', e);
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function setPmStatus(text, type) {
  const el = document.getElementById('pm-status');
  el.textContent = text;
  el.style.color = type === 'ok' ? '#166534' : type === 'err' ? '#e53935' : '#888';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>West Him — Отечественный производитель химии</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; }

    .page { display: flex; flex-direction: column; min-height: 100vh; }

    /* HEADER */
    .header {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 50;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
    .logo img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
    .logo-name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    nav { display: flex; gap: 28px; }
    nav a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
    nav a:hover { color: #fff; }
    .wa-btn {
      display: flex; align-items: center; gap: 7px; padding: 9px 18px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #fff; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: background .2s;
    }
    .wa-btn:hover { background: rgba(255,255,255,0.07); }

    /* HERO */
    .hero { position: relative; overflow: hidden; padding: 56px 60px 52px; }
    .blob { position: absolute; border-radius: 50%; pointer-events: none; }
    .b1 { width:600px; height:600px; background:rgba(200,16,46,.15); filter:blur(100px); top:-150px; left:-100px; }
    .b2 { width:400px; height:400px; background:rgba(91,33,182,.1); filter:blur(100px); bottom:-80px; right:60px; }
    .grid-bg {
      position:absolute; inset:0; pointer-events:none;
      background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* LEFT (now full-width hero content) */
    .left { position:relative; z-index:1; max-width:640px; }
    .badge {
      display:inline-flex; align-items:center; gap:8px; padding:7px 14px; border-radius:100px;
      background:rgba(200,16,46,.12); border:1px solid rgba(200,16,46,.3);
      font-size:13px; font-weight:500; color:#ff6b7a; margin-bottom:24px; width:fit-content;
    }
    .dot { width:7px; height:7px; border-radius:50%; background:#C8102E; box-shadow:0 0 6px #C8102E; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
    h1 { font-size: clamp(34px,3.8vw,56px); font-weight:900; line-height:1.05; letter-spacing:-2px; margin-bottom:18px; }
    .grad { background:linear-gradient(135deg,#ff4d6b,#ff9a3c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .desc { font-size:16px; color:rgba(255,255,255,.55); line-height:1.7; max-width:440px; margin-bottom:22px; }
    .actions { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:0; }
    .btn-red {
      display:flex; align-items:center; gap:8px; padding:13px 24px; border-radius:12px;
      background:#C8102E; color:#fff; font-size:15px; font-weight:700; text-decoration:none;
      box-shadow:0 4px 24px rgba(200,16,46,.4); transition:all .2s;
    }
    .btn-red:hover { background:#a00d24; box-shadow:0 6px 32px rgba(200,16,46,.55); transform:translateY(-1px); }
    .btn-ghost {
      display:flex; align-items:center; gap:8px; padding:13px 24px; border-radius:12px;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      color:#fff; font-size:15px; font-weight:600; text-decoration:none; transition:background .2s;
    }
    .btn-ghost:hover { background:rgba(255,255,255,.1); }

    /* ORBITAL SECTION */
    .orb-section {
      position: relative; overflow: hidden;
      height: 500px;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 60px 60px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .orb-section::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 70% 80% at 50% 50%, rgba(200,16,46,.07) 0%, transparent 70%);
    }
    #orb { position:relative; width:100%; height:100%; }

    /* ORBITAL */
    .stage { position:absolute; }
    .o-ring {
      position:absolute; top:50%; left:50%;
      width:360px; height:360px; border-radius:50%; border:1px solid rgba(255,255,255,.1);
      transform:translate(-50%,-50%); pointer-events:none;
    }
    .o-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10; }
    .o-center img { width:64px; height:64px; border-radius:50%; object-fit:cover; display:block; position:relative; z-index:2; }
    .ping1 { position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(255,255,255,.25); animation:ping 1.8s ease-out infinite; }
    .ping2 { position:absolute; inset:-18px; border-radius:50%; border:1px solid rgba(255,255,255,.12); animation:ping 1.8s .6s ease-out infinite; }
    @keyframes ping { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(1.5);opacity:0} }

    .o-node { position:absolute; top:50%; left:50%; cursor:pointer; transition:opacity .6s, transform .6s; }
    .n-icon {
      width:40px; height:40px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      background:#000; color:#fff; border:2px solid rgba(255,255,255,.4);
      transition:all .3s; position:relative; z-index:2;
    }
    .n-icon svg { width:16px; height:16px; }
    .o-node.exp .n-icon { background:#fff; color:#000; border-color:#fff; box-shadow:0 0 20px rgba(255,255,255,.3); transform:scale(1.5); }
    .o-node.rel .n-icon { background:rgba(255,255,255,.5); color:#000; border-color:#fff; animation:pulse 1s infinite; }
    .n-lbl {
      position:absolute; top:48px; left:50%; transform:translateX(-50%);
      white-space:nowrap; font-size:11px; font-weight:600; letter-spacing:.05em;
      color:rgba(255,255,255,.7); transition:all .3s; pointer-events:none;
    }
    .o-node.exp .n-lbl { color:#fff; transform:translateX(-50%) scale(1.15); }
    .aura {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      border-radius:50%; pointer-events:none;
      background:radial-gradient(circle, rgba(255,255,255,.15) 0%, transparent 70%);
    }

    /* CARD */
    .n-card {
      position:absolute; top:72px; left:50%; transform:translateX(-50%);
      width:240px; background:rgba(0,0,0,.93); backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.2); border-radius:12px; padding:14px;
      z-index:300; box-shadow:0 8px 32px rgba(0,0,0,.7);
    }
    .c-line { position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:1px; height:12px; background:rgba(255,255,255,.4); }
    .c-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .c-badge { padding:3px 8px; border-radius:100px; font-size:10px; font-weight:700; border:1px solid; }
    .bc { background:#000; color:#fff; border-color:#fff; }
    .bp { background:#fff; color:#000; border-color:#000; }
    .bw { background:rgba(0,0,0,.4); color:#fff; border-color:rgba(255,255,255,.4); }
    .c-date { font-size:10px; color:rgba(255,255,255,.45); font-family:monospace; }
    .c-title { font-size:13px; font-weight:700; margin-bottom:6px; }
    .c-text { font-size:11px; color:rgba(255,255,255,.75); line-height:1.6; }
    .c-energy { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.1); }
    .e-row { display:flex; justify-content:space-between; font-size:10px; color:rgba(255,255,255,.55); margin-bottom:4px; }
    .e-bar { width:100%; height:3px; background:rgba(255,255,255,.1); border-radius:9999px; overflow:hidden; }
    .e-fill { height:100%; background:linear-gradient(90deg,#3b82f6,#a855f7); border-radius:9999px; }
    .c-rels { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.1); }
    .r-ttl { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:rgba(255,255,255,.5); margin-bottom:6px; }
    .r-btns { display:flex; flex-wrap:wrap; gap:4px; }
    .r-btn {
      padding:3px 8px; font-size:10px; border:1px solid rgba(255,255,255,.2);
      background:transparent; color:rgba(255,255,255,.75); cursor:pointer;
      border-radius:4px; transition:background .2s; font-family:inherit;
    }
    .r-btn:hover { background:rgba(255,255,255,.12); color:#fff; }

    @media(max-width:900px){
      html,body { overflow:auto; }
      .page { height:auto; }
      .hero { padding:40px 24px 36px; }
      nav { display:none; }
      .orb-section { height: 440px; }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <a href="#" class="logo">
      <img src="logo.jpg" alt="West Him"/>
      <span class="logo-name">West Him</span>
    </a>
    <nav>
      <a href="#">Продукты</a>
      <a href="#">О нас</a>
      <a href="#">Опт</a>
      <a href="#">Контакты</a>
    </nav>
    <a class="wa-btn" href="https://wa.me/77010706960" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Написать
    </a>
  </header>

  <section class="hero">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="grid-bg"></div>

    <div class="left">
      <div class="badge"><span class="dot"></span>Производство в г. Актау, Казахстан</div>
      <h1>Всё для&nbsp;идеальной<br/><span class="grad">чистоты авто</span><br/>и&nbsp;дома</h1>
      <p class="desc">Отечественный производитель бытовой и автохимии из Актау.<br/>Оптом и в розницу — по всему Казахстану.</p>
      <div class="actions">
        <a class="btn-red" href="https://wa.me/77010706960" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Заказать в WhatsApp
        </a>
        <a class="btn-ghost" href="opt.html">
          Условия опта
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </section>

  <section class="orb-section"><div id="orb"></div></section>
</div>

<script>
const ITEMS = [
  { id:1, title:"Бытовая химия", url:"bytovaya-himiya.html",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3h6l1 7H8L9 3z"/><path d="M8 10v11h8V10"/><line x1="12" y1="3" x2="12" y2="10"/></svg>` },
  { id:2, title:"Автохимия", url:"avtohimiya.html",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>` },
  { id:3, title:"Производство", url:"proizvodstvo.html",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>` },
  { id:4, title:"Опт / Розница", url:"opt.html",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>` },
  { id:5, title:"Новинки", url:"novinki.html",
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>` },
];

let angle = 0;
const R = 180;

function pos(i) {
  const a = ((i / ITEMS.length) * 360 + angle) % 360;
  const r = (a * Math.PI) / 180;
  return {
    x: R * Math.cos(r), y: R * Math.sin(r),
    op: Math.max(0.4, Math.min(1, 0.4 + 0.6 * ((1 + Math.sin(r)) / 2))),
    z: Math.round(100 + 50 * Math.cos(r))
  };
}

function build() {
  const orb = document.getElementById("orb");
  orb.innerHTML = "";
  const cx = orb.offsetWidth / 2;
  const cy = orb.offsetHeight / 2;
  const stage = document.createElement("div");
  stage.className = "stage";
  stage.style.cssText = `left:${cx}px;top:${cy}px;`;

  stage.innerHTML = `<div class="o-ring"></div>
    <div class="o-center">
      <div style="position:relative;width:64px;height:64px;">
        <div class="ping1"></div><div class="ping2"></div>
        <img src="logo.jpg" alt="West Him" style="width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;position:relative;z-index:2;"/>
      </div>
    </div>`;

  ITEMS.forEach((item, i) => {
    const p = pos(i);
    const node = document.createElement("div");
    node.className = "o-node";
    node.id = "n" + item.id;
    node.style.cssText = `transform:translate(calc(-50% + ${p.x}px),calc(-50% + ${p.y}px));opacity:${p.op};z-index:${p.z}`;
    node.innerHTML = `
      <div class="aura" style="width:60px;height:60px;"></div>
      <div class="n-icon">${item.icon}</div>
      <div class="n-lbl">${item.title}</div>`;
    node.addEventListener("click", e => { e.stopPropagation(); window.location.href = item.url; });
    stage.appendChild(node);
  });

  orb.appendChild(stage);
  window.addEventListener("resize", () => {
    stage.style.left = (orb.offsetWidth / 2) + "px";
    stage.style.top  = (orb.offsetHeight / 2) + "px";
  });
}

function tick() {
  angle = (angle + 0.3) % 360;
  ITEMS.forEach((item, i) => {
    const el = document.getElementById("n" + item.id);
    if (!el) return;
    const p = pos(i);
    el.style.transform = `translate(calc(-50% + ${p.x}px),calc(-50% + ${p.y}px))`;
    el.style.opacity = p.op;
    el.style.zIndex = p.z;
  });
  requestAnimationFrame(tick);
}

build();
tick();
</script>
</body>
